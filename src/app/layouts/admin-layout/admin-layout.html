<mat-sidenav-container class="sidenav-container">

  <mat-sidenav mode="side" [opened]="sidenavOpen()">
    <div class="sidenav-header">
        <img [src]="logo.src" [alt]="logo.alt" class="sidenav-logo" />
      <span class="sidenav-brand">GDG Tarija</span>
    </div>
    <mat-divider />
    <app-nav-menu (onClick)="sidenavOpen.set(!sidenavOpen())" />
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="toolbar">
      <button mat-icon-button (click)="sidenavOpen.set(!sidenavOpen())" aria-label="Toggle menu">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">GDG Tarija — Panel de eventos</span>
    </mat-toolbar>
    <main class="content">
      <router-outlet />
    </main>
  </mat-sidenav-content>

</mat-sidenav-container>
