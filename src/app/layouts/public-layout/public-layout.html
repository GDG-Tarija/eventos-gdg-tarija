<header class="public-header">
  <mat-toolbar class="public-toolbar">
    <div class="gdg-container flex items-center justify-between w-full h-full">
      <!-- Logo -->
      <a routerLink="/" class="flex items-center shrink-0">
        <img
          [src]="logoHorizontal.src"
          [alt]="logoHorizontal.alt"
          class="hidden sm:block h-7 w-auto"
        />
        <img [src]="logoIcon.src" [alt]="logoIcon.alt" class="sm:hidden h-7 w-auto" />
      </a>

      <!-- User Actions (direct across all viewports) -->
      <div class="flex items-center">
        @if (auth.loading()) {
          <mat-progress-spinner mode="indeterminate" diameter="22" aria-label="Cargando sesión" />
        } @else if (auth.user(); as currentUser) {
          <button
            type="button"
            [matMenuTriggerFor]="userMenu"
            aria-label="Menú de usuario"
            class="relative flex items-center justify-center w-9 h-9 rounded-full overflow-hidden hover:scale-105 active:scale-95 transition-all duration-200 border border-black/10 focus:outline-none bg-transparent p-0 cursor-pointer"
          >
            @if (currentUser.avatar_url) {
              <img
                class="w-full h-full object-cover"
                [src]="currentUser.avatar_url"
                [alt]="currentUser.first_name"
                referrerpolicy="no-referrer"
              />
            } @else {
              <mat-icon class="text-text-secondary text-base">account_circle</mat-icon>
            }
          </button>

          <mat-menu #userMenu="matMenu">
            <span class="menu-user-info" mat-menu-item disabled>
              <strong>{{ currentUser.first_name }} {{ currentUser.last_name }}</strong>
              <br />
              <small>{{ currentUser.email }}</small>
            </span>
            <button mat-menu-item (click)="auth.signOut()">
              <mat-icon>logout</mat-icon>
              <span>Cerrar sesión</span>
            </button>
          </mat-menu>
        } @else {
          <button
            type="button"
            class="px-4 py-2 text-xs sm:text-sm font-bold rounded-full border border-google-blue text-google-blue hover:bg-google-blue-light/20 transition-all duration-300 active:scale-[0.97] flex items-center gap-2 bg-transparent cursor-pointer"
            (click)="auth.signInWithGoogle()"
          >
            <span>Iniciar sesión</span>
          </button>
        }
      </div>
    </div>
  </mat-toolbar>
</header>

<main class="public-content bg-surface-main">
  <router-outlet />
</main>
