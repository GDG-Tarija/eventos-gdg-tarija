<div class="sponsor-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Patrocinadores</h1>
      <span class="page-subtitle">Patrocinadores registrados en el sistema</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add</mat-icon>
      Nuevo Patrocinador
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar patrocinador</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Nombre, descripción, calificación..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredSponsors().length }} resultado(s)</span>
  </div>

  <app-sponsor-table
    [data]="filteredSponsors()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
