<section class="form-login">
  <section class="logo-banner">
    GDG Tarija
  </section>

  <section class="text">
    Iniciar sesión
  </section>

  <p class="description">
    Usa tu cuenta de Google para acceder a la plataforma de eventos.
  </p>

  <button matButton="filled" class="google-button" (click)="loginWithGoogle()">
    <img
      class="google-icon"
      src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
      alt=""
      width="20"
      height="20"
    />
    Continuar con Google
  </button>
</section>
