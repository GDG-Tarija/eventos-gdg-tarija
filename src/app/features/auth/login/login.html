<section class="gdg-page bg-surface-main">
  <div class="gdg-container py-10">
    <div class="mx-auto w-full max-w-xl">
      <div class="gdg-card overflow-hidden">
        <div class="p-10 sm:p-12">
            <div class="font-google text-2xl font-extrabold tracking-tight text-text-primary">
              GDG Tarija
            </div>

            <h1 class="mt-4 text-3xl font-bold tracking-tight text-text-primary">
              Iniciar sesión
            </h1>
            <p class="mt-2 text-text-secondary">
              Usá tu cuenta de Google para acceder a la plataforma de eventos.
            </p>

            <div class="mt-8">
              <button mat-flat-button color="primary" class="gdg-btn-filled w-full" (click)="loginWithGoogle()">
                <img
                  class="mr-3"
                  src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                  alt=""
                  width="20"
                  height="20"
                />
                Continuar con Google
              </button>
            </div>

            <p class="mt-6 text-sm text-text-secondary">
              Al continuar aceptás el uso de tu perfil básico (nombre y foto) para identificarte en la plataforma.
            </p>
        </div>
      </div>
    </div>
  </div>
</section>
