name: Deploy Angular to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    env:
      DIST_PATH: dist/sys/browser

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create environment files
        run: |
          mkdir -p src/environments

          cat > src/environments/environment.ts << 'EOF'
          export const environment = {
            production: false,
            supabaseUrl: '',
            supabaseKey: '',
          };
          EOF

          cat > src/environments/environment.prod.ts << EOF
          export const environment = {
            production: true,
            supabaseUrl: '${{ secrets.SUPABASE_URL }}',
            supabaseKey: '${{ secrets.SUPABASE_KEY }}',
          };
          EOF

      - name: Build
        run: npx ng build --configuration production --base-href /${{ github.event.repository.name }}/

      - name: Verify dist output
        run: ls -la ${{ env.DIST_PATH }}

      - name: Fix SPA routing
        run: cp ${{ env.DIST_PATH }}/index.html ${{ env.DIST_PATH }}/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DIST_PATH }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
